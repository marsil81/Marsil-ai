version: '3.8'

services:
  marsil-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marsil-platform
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:3001
    volumes:
      - ./backend/config.json:/app/backend/config.json
    restart: unless-stopped
